spring:
  config:
    import: optional:classpath:application-env.properties

  application:
    name: online_exam

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
server:
  port: ${SERVER_PORT:8081}

jwt:
  secret: ${JWT_SECRET}
  access-expire: 3600000
  refresh-expire: 604800000

app:
  base-url: ${APP_BASE_URL:http://localhost:3000}
  mail:
    from-name: ExamPortal
  refresh-token:
    ttl-seconds: 604800
  activity-log:
    retention-days: 30
    cleanup-cron: "0 5 3 * * *"

gemini:
  api:
    key: ${GEMINI_API_KEY}
  model: gemini-2.5-flash